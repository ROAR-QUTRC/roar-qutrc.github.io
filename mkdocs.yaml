site_name: ROAR Documentation
site_url: https://sitename.example
repo_url: https://github.com/ROAR-QUTRC/perseus-v2
copyright: "&copy; Copyright 2026, ROAR Team."
theme:
  name: material
  logo: assets/Rover-Logo.svg
  favicon: assets/Logo-Simple.png
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    # - navigation.sections # Converts second level navigation into sections
    - navigation.tabs # Converts top level navigation into tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - content.tabs.link # All tab groups with the same title with
    - toc.follow
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: deep orange
      accent: deep orange
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: deep orange
      accent: deep orange
  font:
    text: Roboto
    code: Roboto Mono
extra:
  homepage: /01-home
  social:
    - icon: simple/github
      link: https://github.com/ROAR-QUTRC
    - icon: simple/instagram
      link: https://www.instagram.com/qutroarteam/reels/
    - icon: fontawesome/brands/linkedin
      link: https://au.linkedin.com/company/roar-team

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - awesome-nav

markdown_extensions:
  # Callouts
  - admonition # adds admonitions
  - pymdownx.details # adds collapsible sections
  - pymdownx.superfences # allows for nesting of fenced code blocks

  # Extended Markdown Features
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - def_list
  - footnotes
  - pymdownx.mark
  - attr_list

  # math
  - pymdownx.arithmatex:
      generic: true

  # Code Highlighting
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # Emoji Support
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator:
        !!python/name:material.extensions.emoji.to_svg # Tab groups


  - pymdownx.tabbed:
      alternate_style: true
