site_name: Perseus V3 Documentation
site_url: https://sitename.example
repo_url: https://github.com/ROAR-QUTRC/perseus-v2
copyright: "&copy; Copyright 2026, ROAR Team."
theme:
  name: material
  logo: assets/Rover-Logo.svg
  favicon: assets/Logo-Simple.png
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs # Converts top level navigation into tabs
    # - navigation.sections # Converts second level navigation into sections
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: deep orange
      accent: deep orange
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: deep orange
      accent: deep orange
extra:
  social:
    - icon: simple/github
      link: https://github.com/ROAR-QUTRC
    - icon: simple/instagram
      link: https://www.instagram.com/qutroarteam/reels/
    - icon: fontawesome/brands/linkedin
      link: https://au.linkedin.com/company/roar-team

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
